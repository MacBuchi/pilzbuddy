name: Release

# Zwei Wege zum Release (Muster wie in durecmix/FWApp):
#  - Push eines Tags v* baut und veröffentlicht genau diesen Stand.
#  - Push auf main: steht in pubspec.yaml eine Version ohne passenden Tag,
#    wird v<version> automatisch getaggt und released. Kein Bump = kein Release.
on:
  push:
    branches: [main]
    tags: ["v*"]

# Releases nacheinander, aber NIEMALS abbrechen: ein mittendrin gekappter
# Lauf hinterlässt einen gepushten Tag ohne APK und ohne Web-Deploy.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    name: Determine release tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.decide.outputs.tag }}
      release: ${{ steps.decide.outputs.release }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: decide
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          version=$(sed -n 's/^version: \([0-9][0-9.]*\).*/\1/p' pubspec.yaml)
          tag="v$version"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Tag $tag existiert schon — kein neues Release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$tag"
            git push origin "$tag"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

  # Sicherheitsnetz: normalerweise spielt schon der Pflicht-Check im PR
  # neue DB-Patches ein (ci.yml, "Schema Check"). Vor dem Veröffentlichen
  # wird hier trotzdem migriert (idempotent über public.applied_patches)
  # und das Live-Schema erneut gegen die App-Queries geprüft — eine App,
  # deren Queries auf der Live-DB scheitern, wird nie ausgeliefert.
  migrate:
    name: DB-Patches & Schema Check
    needs: version
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: DB-Patches einspielen
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: bash tool/db_migrate.sh
      - name: Live-Schema gegen die App-Queries prüfen
        run: bash tool/schema_check.sh

  build-android:
    name: Build Android APK (signed)
    needs: [version, migrate]
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.2
          cache: true
      - run: flutter pub get
      - name: Write signing config
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 fehlt — es wird keine debug-signierte Release-APK veröffentlicht."
            exit 1
          fi
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/pilzbuddy-release.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=pilzbuddy-release.jks
          EOF
      - run: flutter build apk --release
      - name: Artefakt benennen
        run: cp build/app/outputs/flutter-apk/app-release.apk "pilzbuddy-${{ needs.version.outputs.tag }}.apk"
      - uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: pilzbuddy-${{ needs.version.outputs.tag }}.apk

  deploy-web:
    name: Deploy Web (GitHub Pages)
    needs: [version, migrate]
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.2
          cache: true
      - run: flutter pub get
      - run: flutter build web --release --base-href /pilzbuddy/
      # SPA-Fallback: GitHub Pages liefert 404.html bei Deep-Links (/friends etc.)
      - run: cp build/web/index.html build/web/404.html
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          force_orphan: true

  release:
    name: Create GitHub Release
    needs: [version, build-android]
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: pilzbuddy-*.apk
