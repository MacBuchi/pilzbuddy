name: Feedback Bot

# Turns in-app feedback into GitHub issues (feature requests) and
# ready-to-merge species PRs (merge = accept, close = reject).
on:
  schedule:
    - cron: "23 */2 * * *" # every two hours
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Process feedback
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL: https://tntlujexvdtkynxbrdsn.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Repository secret SUPABASE_SERVICE_ROLE_KEY is missing."
            exit 1
          fi
          python3 tool/feedback_bot.py
