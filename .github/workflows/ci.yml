name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Ein Folge-Commit auf demselben Branch macht den laufenden Check wertlos —
# abbrechen statt parallel weiterlaufen lassen (spart vor allem den 6–7
# Minuten langen Android-Build).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.2
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.2
          cache: true
      - run: flutter pub get
      - run: flutter build web --release --base-href /pilzbuddy/
      - uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: build/web
          retention-days: 14

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.2
          cache: true
      - run: flutter pub get
      # Ohne key.properties fällt der Build auf Debug-Signing zurück —
      # für den CI-Kompilier-Check reicht das; signiert wird im Release-Workflow.
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  # Spielt neue supabase/patch_NNN_*.sql direkt aus dem PR in die Live-DB
  # ein und prüft danach, ob alle App-Queries zum Live-Schema passen.
  # Pflicht-Check: ein PR, dessen Code neues Schema braucht, kann erst
  # gemergt werden, wenn der Patch wirklich in der Datenbank ist (#27).
  schema-check:
    name: Schema Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Neue DB-Patches einspielen
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: bash tool/db_migrate.sh
      - name: Live-Schema gegen die App-Queries prüfen
        run: bash tool/schema_check.sh

  housekeeping:
    name: Version Guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Versions-Bump prüfen
        run: |
          set -euo pipefail
          version=$(sed -n 's/^version: \([0-9][0-9.]*\).*/\1/p' pubspec.yaml)
          latest=$(git tag -l 'v*' | sort -V | tail -1)
          echo "pubspec: $version — letzter Tag: ${latest:-keiner}"
          if [ -z "$latest" ]; then
            echo "Noch kein Release-Tag — nichts zu prüfen."
            exit 0
          fi
          if [ "$(printf '%s\n' "${latest#v}" "$version" | sort -V | tail -1)" != "$version" ] \
             || [ "${latest#v}" = "$version" ]; then
            # Version ist nicht größer als der letzte Tag → nur relevant,
            # wenn sich seither Nicht-Doku-Dateien geändert haben.
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              changed=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD -- . ':!*.md' ':!.github' || true)
            else
              changed=$(git diff --name-only "$latest"..HEAD -- . ':!*.md' ':!.github' || true)
            fi
            if [ -n "$changed" ]; then
              # Blockiert den Merge (Pflicht-Check): Code-Änderungen brauchen
              # immer einen Versions-Bump, sonst entsteht kein Release.
              # Reine Doku (*.md) und .github/ sind ausgenommen.
              echo "::error::Code geändert, aber version in pubspec.yaml ($version) ist nicht größer als $latest. Bitte Version bumpen (beide Teile, z. B. 1.2.3+4 → 1.2.4+5) — ohne Bump gibt es kein Release."
              exit 1
            fi
          fi
