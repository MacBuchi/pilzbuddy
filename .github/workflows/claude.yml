name: Claude

# Review loop: the maintainer approves a triage proposal by commenting
# e.g. "@claude setz das wie vorgeschlagen um". Claude then implements on
# a branch and opens a PR — merging stays manual (protected main + CI).
# Only users with write access can trigger this.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'assigned' && github.event.assignee.login == 'claude')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write # create branches/commits for the implementation
      pull-requests: write
      issues: write
      id-token: write
      actions: read # inspect CI results on its own PRs
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Alternative with API billing (instead of the subscription token):
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --append-system-prompt "Follow CLAUDE.md: feature branch + PR (never push to main), Conventional Commits in English, bump the pubspec version for code changes (Version Guard blocks merges without it), German UI strings. The maintainer merges PRs manually."
