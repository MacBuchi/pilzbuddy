<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
<!-- Play-Feature-Grafik (1024x500). Quelle für store/feature-graphic.png:
     rsvg-convert -w 1024 -h 500 store/feature-graphic.svg -o store/feature-graphic.png

     Die Buddies sind unverändert aus assets/icon/icon_fg.svg übernommen
     (gleiche Pfade, nur anders skaliert) — die Feature-Grafik steht im Store
     direkt neben dem App-Icon, jede Abweichung fiele dort auf.
     Farben aus lib/core/app_colors.dart.

     Text bleibt zwischen x=520 und x=980 und damit weit weg von den Rändern:
     Play beschneidet die Grafik in manchen Platzierungen. -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDF6E3"/>
      <stop offset="1" stop-color="#F6E7C6"/>
    </linearGradient>
    <linearGradient id="cap1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8D6E63"/>
      <stop offset="1" stop-color="#5D4037"/>
    </linearGradient>
    <linearGradient id="cap2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EF5350"/>
      <stop offset="1" stop-color="#C62828"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7CB342"/>
      <stop offset="1" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="500" fill="url(#sky)"/>

  <!-- Wiese: zwei Hügel, der hintere heller — Tiefe ohne Deko-Ballast. -->
  <path d="M -20 470 Q 220 372 520 424 Q 800 470 1044 396 L 1044 520 L -20 520 Z"
        fill="#A5D6A7" opacity="0.55"/>
  <path d="M -20 500 Q 260 404 560 446 Q 820 482 1044 434 L 1044 520 L -20 520 Z"
        fill="url(#hill)"/>

  <!-- Funkeln wie im App-Icon, hier als Akzent über der Wiese. -->
  <path d="M 470 112 l 0 34 M 453 129 l 34 0" stroke="#F9A825" stroke-width="10"
        stroke-linecap="round" opacity="0.75"/>
  <path d="M 348 62 l 0 24 M 336 74 l 24 0" stroke="#F9A825" stroke-width="8"
        stroke-linecap="round" opacity="0.6"/>

  <!-- Buddies: Cluster 222..800 x 452..913 aus icon_fg.svg, Faktor 0.72.
       Die Stiele enden knapp unter der vorderen Hügelkante — die Buddies
       stehen in der Wiese statt darüber zu schweben. -->
  <g transform="translate(-90 -180) scale(0.72)">
    <!-- Buddy 1: Steinpilz -->
    <g>
      <path d="M 310 640 Q 310 875 358 892 Q 382 900 406 892 Q 454 875 454 640 Z" fill="#FFF8E1"/>
      <path d="M 222 648 Q 222 452 382 452 Q 542 452 542 648 Q 462 678 382 678 Q 302 678 222 648 Z" fill="url(#cap1)"/>
      <ellipse cx="330" cy="520" rx="52" ry="26" fill="#A1887F" opacity="0.75" transform="rotate(-18 330 520)"/>
      <circle cx="356" cy="742" r="11" fill="#3E2723"/>
      <circle cx="410" cy="742" r="11" fill="#3E2723"/>
      <path d="M 350 778 Q 383 804 416 778" stroke="#3E2723" stroke-width="9" stroke-linecap="round" fill="none"/>
      <circle cx="336" cy="768" r="9" fill="#F8BBD0" opacity="0.85"/>
      <circle cx="430" cy="768" r="9" fill="#F8BBD0" opacity="0.85"/>
    </g>
    <!-- Buddy 2: Fliegenpilz -->
    <g>
      <path d="M 618 730 Q 618 892 656 906 Q 676 913 696 906 Q 734 892 734 730 Z" fill="#FFFDE7"/>
      <path d="M 552 738 Q 552 576 676 576 Q 800 576 800 738 Q 738 764 676 764 Q 614 764 552 738 Z" fill="url(#cap2)"/>
      <circle cx="612" cy="660" r="17" fill="#FFFFFF"/>
      <circle cx="676" cy="616" r="14" fill="#FFFFFF"/>
      <circle cx="742" cy="668" r="15" fill="#FFFFFF"/>
      <circle cx="668" cy="712" r="10" fill="#FFFFFF"/>
      <circle cx="654" cy="800" r="9" fill="#3E2723"/>
      <circle cx="698" cy="800" r="9" fill="#3E2723"/>
      <path d="M 650 828 Q 676 848 702 828" stroke="#3E2723" stroke-width="8" stroke-linecap="round" fill="none"/>
      <circle cx="638" cy="820" r="7" fill="#F8BBD0" opacity="0.85"/>
      <circle cx="714" cy="820" r="7" fill="#F8BBD0" opacity="0.85"/>
    </g>
  </g>

  <text x="520" y="228" font-family="Avenir Next, Helvetica Neue, Helvetica, sans-serif"
        font-size="92" font-weight="700" fill="#2E7D32">PilzBuddy</text>
  <text x="524" y="292" font-family="Avenir Next, Helvetica Neue, Helvetica, sans-serif"
        font-size="36" font-weight="500" fill="#4E342E">Fundorte merken.</text>
  <text x="524" y="340" font-family="Avenir Next, Helvetica Neue, Helvetica, sans-serif"
        font-size="36" font-weight="500" fill="#4E342E">Mit Freunden teilen.</text>
</svg>
